name: football
description: FootballBook — تطبيق حجز ملاعب (لاعب، مالك ملعب، أدمن).
publish_to: 'none'
version: 1.0.1+9
environment:
  sdk: ">=3.10.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2

  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  cached_network_image: ^3.4.1
  http: ^1.6.0
  image_picker: ^1.2.1
  mobile_scanner: ^7.2.0
  url_launcher: ^6.3.2
  file_picker: ^10.3.10
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^21.0.0
  geolocator: ^14.0.2
  
  # UI/UX Enhancements
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  lottie: ^3.1.2
  flutter_slidable: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

  build_runner: ^2.5.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5

  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icon/icon.png
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
